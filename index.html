<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Platform</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
</head>
<body>
    <h1>Exam Platform</h1>
    <form id="upload-form">
        <input type="file" id="file-input" name="file" accept="application/zip" required>
        <button type="submit">Upload</button>
    </form>
    <div id="progress-indicator" style="display: none;">Uploading...</div>
    <script>
        document.getElementById('upload-form').onsubmit = function(event) {
            event.preventDefault();
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];

            // Validate file size
            if (file.size > 10 * 1024 * 1024) { // 10 MB limit
                alert('File size exceeds the limit of 10MB.');
                return;
            }

            document.getElementById('progress-indicator').style.display = 'block';

            // Perform validation and sanitize file input
            const formData = new FormData();
            formData.append('file', file);

            // Ensure file is a valid zip
            const zip = new JSZip();
            zip.loadAsync(file)
                .then(function(contents) {
                    // Handle success
                    console.log('File is valid and processed.');
                    // Add more processing logic as needed
                })
                .catch(function(e) {
                    alert('Error processing file: ' + e.message);
                })
                .finally(function() {
                    document.getElementById('progress-indicator').style.display = 'none';
                });
        };
    </script>
</body>
</html>
